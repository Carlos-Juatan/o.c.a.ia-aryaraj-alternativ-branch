version: '3.8'

services:
  backend:
    build: ../backend
    container_name: backend-agente-local
    env_file:
      - ../.env
    ports:
      - "8002:8000"
    volumes:
      - ../backend:/app
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - DATABASE_URL=${DATABASE_URL}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - PYTHONUNBUFFERED=1
      - RABBITMQ_URL=${RABBITMQ_URL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-agente-local
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: ../backend
    container_name: worker-agente-local
    env_file:
      - ../.env
    ports:
      - "8002:8000"
    volumes:
      - ../backend:/app
    environment:
      - POSTGRES_HOST=db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - PYTHONUNBUFFERED=1
    command: [ "sh", "/app/entrypoint.sh", "worker" ]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    container_name: frontend-agente-local
    env_file:
      - ../.env
    ports:
      - "5300:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8002
    depends_on:
      - backend
